name: "Corporate CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target' || github.event.comment.body == 'recheck'
    
    steps:
      - name: "Validate CLA Signature Ledger"
        uses: cla-assistant/github-action@v2.5.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_BOT_TOKEN }}
        with:
          path-to-signatures: 'signatures/production/cla_signatures.json'
          path-to-document: 'github.com{{ github.repository }}/blob/main/legal/CCLA_TEMPLATE.md'
          branch: 'cla-signatures'
          allowlist: 'dependabot[bot],github-actions[bot]'
          custom-pr-comment: |
            Thank you for submitting a pull request to our Enterprise ML engine! 
            
            Before our systems can merge your modifications, you must provide legal signature consent.
            
            Please read the [Contributor License Agreement](github.com{{ github.repository }}/blob/main/legal/CCLA_TEMPLATE.md).
            
            To execute your signature confirmation, reply to this comment directly with the exact string match:
            `I have read the CLA and I hereby sign it.`
          custom-label: 'cla-required'

