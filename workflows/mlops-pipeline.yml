name: "Enterprise MLOps Core Pipeline"

on:
  push:
    branches: [ main, release/* ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  quality-and-security:
    name: "Code Audit & Security Scans"
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for accurate historical secret scanning

      - name: "Set up Python Environment"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: "Install Enterprise Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit safety pytest pip-licenses
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: "Linting Optimization (Flake8)"
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. Enterprise code quality tracking.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: "Security Vulnerability Scan (Bandit)"
        run: |
          # Checks for hardcoded SQL injections, raw eval commands, and weak cryptography
          bandit -r data_pipeline/ src/ -ll

      - name: "Dependency Vulnerability Check (Safety)"
        run: |
          # Verifies installed open-source libraries do not possess known CVE vulnerabilities
          safety check --full-report || true # Bypasses hard blocker for demonstration environments

      - name: "Open-Source License Audit"
        run: |
          # Automatically flags toxic open-source licenses (AGPL / GPL)
          pip-licenses --summary
          pip-licenses --fail-on AGPL3 GPL3

  unit-and-data-testing:
    name: "Pipeline & Feature Testing"
    needs: quality-and-security
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Set up Python Environment"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: "Execute System Tests (PyTest)"
        run: |
          # Executes automated validation on anonymizer.py and validator.py logic
          pytest tests/ || true # Graceful flag until we explicitly write out test directories

  container-audit:
    name: "Production Image Compilation Check"
    needs: unit-and-data-testing
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Dry-Run Docker Compiles"
        run: |
          # Validates your enterprise Docker environment compiles seamlessly
          docker build -t enterprise-ml-service:test .
