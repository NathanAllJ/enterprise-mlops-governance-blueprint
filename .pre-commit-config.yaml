# ==============================================================================
# ENTERPRISE PRE-COMMIT COMPLIANCE HOOKS
# ==============================================================================
# Installation: pip install pre-commit && pre-commit install

repos:
  - repo: github.com
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']        # Blocks accidental uploads of massive raw datasets
      - id: check-yaml               # Validates structural syntax of workflow YAMLs
      - id: check-json               # Validates syntax of config/security_policy.json
      - id: end-of-file-fixer        # Ensures clean, uniform file endings
      - id: trailing-whitespace      # Trims unnecessary trailing spaces

  - repo: github.com
    rev: v8.18.2
    hooks:
      - id: gitleaks-system          # Scans local modifications for cleartext API keys or DB credentials

  - repo: github.com
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=127', '--extend-ignore=E203']
        additional_dependencies: [flake8-docstrings]

